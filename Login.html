<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Acceso administrativo | Inmobiliaria Primavera</title>

    <meta 
        name="description" 
        content="Página de acceso administrativo para Inmobiliaria Primavera."
    >

    <!-- Evita que Google indexe esta página -->
    <meta name="robots" content="noindex, nofollow">

    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="./CSS/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    
</head>
<body class="bodymagin">
    <main class="login-main">
        <section class="login-section" aria-labelledby="login-title">

            <div class="login-brand">
                <img 
                    src=".\Imagenes\Logosolo.png" 
                    alt="Logo de Inmobiliaria Primavera" 
                    class="login-logo"
                >
                <p class="login-brand-text1">Primavera</p>
                <p class="login-brand-text2">INMOBILIARIA</p>
            </div>

            <div class="login-container">
                <h1 id="login-title">Iniciar sesión</h1>

                <form action="/admin/login" method="POST" class="login-form">

                    <div class="form-group floating-group">
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            autocomplete="username"
                            required
                            placeholder=" "
                        >
                        <label for="username">Usuario</label>
                    </div>

                    <div class="form-group floating-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            autocomplete="current-password"
                            required
                            placeholder=" "
                        >
                        <label for="password">Contraseña</label>
                    </div>
                    <div class="Login-buttons">
                        <a href="../index.html" class="back-link">Volver</a>
                        <button type="submit">Acceder</button>
                    </div>
                </form>
            </div>

        </section>

    </main>
    <div class="login-footer">
        <p class="login-footer-text">&copy; 2026 Inmobiliaria Primavera. Todos los derechos reservados.</p>
    </div>
</body>
</html>
